
# 🛡️ DevSecOps Pipeline - Gatekeeper
# Este workflow ejecuta automáticamente todos los hooks definidos en .pre-commit-config.yaml

name: CI/CD Gatekeeper

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pre-commit-checks:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ⚙️ Instalar pre-commit
        run: pip install pre-commit

      - name: 🚀 Ejecutar pruebas de seguridad y formato
        run: pre-commit run --all-files

# ⚠️ PASO MANUAL REQUERIDO EN GITHUB:
# 1. Ve a tu repositorio en GitHub.com -> Settings -> Branches
# 2. Edita la protección de la rama 'main' (Branch protection rules).
# 3. Activa "Require status checks to pass before merging".
# 4. Busca y selecciona "pre-commit-checks" en la lista.
