#v1
# /content/english-editor/.pre-commit-config.yaml
# ╔══════════════════════════════════════════════════════════════════════════════╗
# #  🛡️ PRE-COMMIT CONFIGURATION - english-editor Project                          #
# #  Propósito: Verificar calidad de código ANTES de cada commit                 #
# #  Documentación: https://pre-commit.com/                                       #
# #                                                                               #
# #  📋 ESTRUCTURA POR FASES DE APRENDIZAJE:                                      #
# #  • Fase 1: Esenciales (activos por defecto)                                   #
# #  • Fase 2: Recomendados (comentados, activar en Semana 2)                     #
# #  • Fase 3: Avanzados (comentados, activar en Semana 3-4)                      #
# #  • Fase 4: CI/CD only (NO usar en pre-commit, solo GitHub Actions)            #
# #                                                                               #
# #  🚀 INSTALACIÓN RÁPIDA:                                                       #
# #  1. pip install pre-commit                                                    #
# #  2. pre-commit install                                                        #
# #  3. pre-commit run --all-files  (para probar en todos los archivos)           #
# # ╚══════════════════════════════════════════════════════════════════════════════╝

repos:
  # ──────────────────────────────────────────────────────────────────────────────
  # 🟢 FASE 1: PROTECCIÓN DE RAMAS (Local hook - Rápido <1 seg)
  # ──────────────────────────────────────────────────────────────────────────────
  # Hook personalizado para evitar commits accidentales en la rama main.
  # Recomendado: ACTIVAR SIEMPRE en repositorios con ramas protegidas

  - repo: local
    hooks:
      - id: protect-main-branch
        name: "🔒 Evitar commits directos en main"
        entry: python scripts/hooks/protect_main.py
        language: system
        pass_filenames: false
        always_run: true  # ✅ CRUCIAL: Obliga al hook a correr siempre,
                          # aunque no haya archivos en el "stage".
        stages: [pre-commit]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0  # ✅ Usar versión específica para reproducibilidad
    hooks:
      - id: trailing-whitespace
        # 📝 Elimina espacios al final de cada línea
        # 💡 Por qué: Evita diffs sucios en Git
      - id: end-of-file-fixer
        # 📝 Asegura que los archivos terminen con un newline (\n)
        # 💡 Por qué: Estándar POSIX, evita errores en herramientas Unix
        # 🎯 ¡Esto arregla automáticamente el error W292 de Ruff!
      - id: check-yaml
        # 📝 Valida sintaxis de archivos YAML
        # 💡 Por qué: Evita errores en configs de CI/CD, Docker, etc.
      - id: check-json
        # 📝 Valida sintaxis de archivos JSON
        # 💡 Por qué: Evita errores en configs de proyectos
      - id: check-merge-conflict
        # 📝 Detecta marcadores de conflicto de merge no resueltos
        # 💡 Por qué: Evita commitear código con conflictos
      - id: detect-private-key
        # 📝 Detecta claves privadas (RSA, SSH, etc.) commitadas por error
        # 💡 Por qué: 🚨 SEGURIDAD - Evita exponer credenciales
      - id: check-added-large-files
        # 📝 Previene commitear archivos >500KB
        # 💡 Por qué: Evita inflar el repositorio Git
        args: ['--maxkb=500']
        # ──────────────────────────────────────────────────────────────────────────────
        # 🟢 FASE 1: VALIDACIÓN DE CONFIGURACIONES TOML (Rápido <1 seg)
        # ──────────────────────────────────────────────────────────────────────────────
        # TOML es el formato usado por pyproject.toml (config central del ecosistema Python).
        # Este hook verifica que todos los archivos .toml tengan sintaxis válida.
        # Recomendado: ACTIVAR SIEMPRE (igual que YAML y JSON)

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
        stages: [pre-commit]
        # 📝 Valida sintaxis de archivos TOML
        # 💡 Por qué: Evita errores en archivos como:
        #   • pyproject.toml
        #   • config.toml
        #   • tool.* configurations
        #
        # 🚨 Detecta errores como:
        #
        #   [tool.black
        #   line-length = 88
        #
        # donde falta cerrar el corchete "]".
        #
        # 💡 IMPORTANTE:
        # TOML se usa para configurar herramientas modernas como:
        #   • black
        #   • ruff
        #   • mypy
        #   • pytest
        #   • poetry / build systems
        #
        # 🎯 Resultado:
        # Evita que una mala configuración rompa tu entorno de desarrollo
        # ──────────────────────────────────────────────────────────────────────────────
        # 🟢 FASE 1: FORMATO (Black - Rápido <5 seg)
        # ──────────────────────────────────────────────────────────────────────────────
        # Black formatea automáticamente tu código. No hay discusión de estilo.
        # Recomendado: ACTIVAR SIEMPRE
  - repo: https://github.com/psf/black
    rev: 26.3.1  # Usa la versión específica que quieras estandarizar
    hooks:
      - id: black
        stages: [pre-commit]
        args: ['--target-version', 'py310']  # ← Forzar versión aquí también


  #- repo: https://github.com/psf/black
  #  rev: 24.1.0
  #  hooks:
  #    - id: black
  #      # 📝 Formatea código Python automáticamente
  #      # 💡 Por qué: Consistencia en todo el equipo, diffs más limpios
  #      stages: [pre-commit]   #
  #      language_version: python3.10  # ✅ Ajustar a tu versión de Python
  #      args: [--line-length=88]  # 📏 Longitud máxima de línea (estándar Black)

        # ──────────────────────────────────────────────────────────────────────────────
        # 🟢 FASE 1: LINT + SEGURIDAD BÁSICA (Ruff - Rápido <10 seg)
        # ──────────────────────────────────────────────────────────────────────────────
        # Ruff reemplaza a flake8, isort, pyupgrade, y más. Es extremadamente rápido.
        # Recomendado: ACTIVAR SIEMPRE
  - repo: https://github.com/astral-sh/ruff-pre-commit
    #rev: v0.1.14
    rev: v0.15.8
    hooks:
      - id: ruff
        stages: [pre-commit]
        # 📝 Linter ultra-rápido para Python
        # 💡 Por qué: Detecta bugs, código no Pythonico, imports mal ordenados
        # 🔧 --fix: Auto-correge lo que sea posible
        # ⚠️  --exit-non-zero-on-fix: Falla si hubo correcciones (para forzar review)
        args: [--fix, --exit-non-zero-on-fix]
        #args: [--fix, --unsafe-fixes] # Si estás absolutamente decidido a que sea el orquestador quien ejecute la reparación
        # 📋 Reglas activas por defecto:
        #   • F: Pyflakes (bugs comunes)
        #   • E: Pycodestyle (errores de estilo)
        #   • W: Pycodestyle warnings
        #   • I: isort (orden de imports)
        #   • N: pep8-naming (nombres de variables/clases)
        #   • UP: pyupgrade (sintaxis moderna de Python)

        # ──────────────────────────────────────────────────────────────────────────────
        # 🟡 FASE 2: VALIDACIÓN ESTRUCTURAL DE pyproject.toml (Medio ~1-3 seg)
        # ──────────────────────────────────────────────────────────────────────────────
        # Valida que pyproject.toml siga correctamente los estándares del ecosistema Python.
        # Este hook es más avanzado que check-toml porque valida la estructura.
        #
        # Recomendado: ACTIVAR en Semana 2 cuando tu proyecto use pyproject.toml activamente.

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject
        stages: [pre-commit]
         # 💾 RESTORE: [pre-commit]
        # 📝 Valida estructura y estándares de pyproject.toml
        #
        # 💡 Por qué:
        # pyproject.toml es el archivo central del ecosistema Python moderno.
        #
        # Este hook verifica que siga correctamente:
        #
        #   • PEP 518  → build system
        #   • PEP 621  → metadata del proyecto
        #
        # Detecta errores como:
        #
        #   [project]
        #   name = 123
        #
        # donde el nombre del proyecto debe ser un string.
        #
        # 🚨 Detecta problemas en:
        #   • metadata del paquete
        #   • dependencias mal definidas
        #   • configuraciones inválidas de herramientas
        #
        # 💡 RECOMENDACIÓN:
        # Mantenerlo en manual o CI/CD si tu pyproject.toml cambia poco.
        #
        # enabled: false  # ← Descomentar para activar cuando uses pyproject.toml intensivamente


        # ──────────────────────────────────────────────────────────────────────────────
        # 🟡 FASE 2: SEGURIDAD ESPECÍFICA (Bandit - Medio ~10-30 seg)
        # ──────────────────────────────────────────────────────────────────────────────
        # Bandit escanea vulnerabilidades específicas de Python (eval, SQL injection, etc.)
        # Recomendado: ACTIVAR en Semana 2 (cuando te sientas cómodo con lo básico)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        stages: [manual] # 💾 RESTORE: [pre-commit]
         # 💾 RESTORE: [pre-commit]
        # 📝 Escáner de seguridad para código Python
        # 💡 Por qué: Detecta vulnerabilidades como hardcoded passwords, eval(), etc.
        # ⚠️  -r: Recursivo en directorios
        # ⚠️  -ll: Nivel de log (l=low, ll=medium, lll=high)
        args: ["-r", "src/", "-ll"]
        # 🚨 DESCOMENTAR CUANDO:
        #   • Entiendas qué vulnerabilidades detecta
        #   • Hayas limpiado los warnings iniciales
        #   • Lo uses para desarrollo, no solo CI/CD
        # 💡 ALTERNATIVA: Dejar solo en CI/CD si es muy lento
        # enabled: false  # ← Descomentar para desactivar temporalmente

        # ──────────────────────────────────────────────────────────────────────────────
        # 🟡 FASE 2: SECRETOS EN CÓDIGO (Gitleaks - Medio ~10-30 seg)
        # ──────────────────────────────────────────────────────────────────────────────
        # Gitleaks detecta secretos (API keys, tokens, passwords) en el código.
        # Recomendado: ACTIVAR en Semana 2 (crítico para seguridad)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        stages: [manual] # 💾 RESTORE: [pre-commit]
         # 💾 RESTORE: [pre-commit]
        # 📝 Verificador de tipos estático para Python
        # 💡 Por qué: Previene errores de tipo en runtime (NoneType, etc.)
        # ⚠️  --ignore-missing-imports: Ignora errores de libs sin type stubs
        # 🚨 DESCOMENTAR CUANDO:
        #   • Tu código tenga type hints completos
        #   • Hayas corregido todos los errores de mypy manualmente
        #   • Lo muevas a CI/CD si es muy lento para pre-commit
        #args: [--ignore-missing-imports]
        #additional_dependencies:
        #  - types-requests  # ✅ Type stubs para requests
        #  - types-PyYAML    # ✅ Type stubs para PyYAML
        # 💡 RECOMENDACIÓN: Dejar esto SOLO en CI/CD
        # enabled: false  # ← Mantener comentado para pre-commit, usar en GitHub Actions
        # exclude: ^tests/  # ⚠️  Excluir tests (opcional, para reducir tiempo)

        # ──────────────────────────────────────────────────────────────────────────────
        # 🟠 FASE 3: TESTS (pytest - Muy lento ~1-5 min)
        # ──────────────────────────────────────────────────────────────────────────────
        # Ejecutar tests antes de cada commit es IDEAL pero puede ser lento.
        # Recomendado: NO USAR en pre-commit. Mejor en CI/CD.
  - repo: local
    hooks:
      - id: pytest
        stages: [manual] # 💾 RESTORE: [pre-commit]
         # 💾 RESTORE: [pre-commit]
        # 📝 Ejecuta tests unitarios antes de commit
        # 💡 Por qué: Previene commitear código roto
        # ⚠️  ADVERTENCIA: Puede hacer el commit MUY lento
        # 🚨 DESCOMENTAR CUANDO:
        #   • Tus tests sean rápidos (<30 seg)
        #   • Uses pytest con --ff (fall fast) para detenerse al primer fallo
        # 💡 RECOMENDACIÓN: Usar SOLO en CI/CD
        name: pytest
        entry: pytest
        language: system
        pass_filenames: false
        always_run: true
        args: ["-x", "-v", "tests/"]  # -x: stop on first failure
        # enabled: false  # ← Mantener comentado (usar en GitHub Actions)





  # ──────────────────────────────────────────────────────────────────────────────
  # 🟢 FASE 3: LINTER DE MENSAJES DE COMMIT (gitlint - Python, rápido ~1-3 seg)
  # ──────────────────────────────────────────────────────────────────────────────
  # Valida mensajes de commit con reglas personalizables.
  # Recomendado: Activar solo en desarrollo local, no en CI de Colab.
  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1  # ✅ Última versión estable
    hooks:
      - id: gitlint
        stages: [manual] # 💾 RESTORE: [pre-commit]
         # 💾 RESTORE: [commit-msg]  # Solo se ejecuta al hacer commit
        # 📝 Reglas por defecto: título ≤72 chars, cuerpo separado por línea en blanco
        # 💡 Por qué: Consistencia en el historial Git sin depender de Node.js
        # enabled: false  # ← Descomentar para activar cuando tengas flujo Git local

        ##🔧 Configuración opcional .gitlint (en raíz del repo):
        #[general]
        ## Ignorar checks que no aplican a tu flujo
        #ignore=body-is-missing

        #[title-max-length]
        ## Permitir títulos más largos si usas Conventional Commits
        #line-length=100



       # 404 ERROR
       # ──────────────────────────────────────────────────────────────────────────────
       # 🟠 FASE 3: DEPENDENCIAS VULNERABLES (safety/pip-audit - Lento ~30-60 seg)
       # ──────────────────────────────────────────────────────────────────────────────
       # Verifica que tus dependencias (requirements.txt) no tengan CVEs conocidas.
       # Recomendado: NO USAR en pre-commit. Mejor en CI/CD semanal.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        stages: [manual] # 💾 RESTORE: [pre-commit]
         # 💾 RESTORE: [pre-commit]
        # 📝 Detecta secretos y credenciales en el código
        # 💡 Por qué: 🚨 SEGURIDAD CRÍTICA - Evita exponer API keys, passwords, etc.
        # 🎯 ¡Esto detecta lo mismo que tu archivo_peligroso.py!
        #args: ["detect", "--source", ".", "--no-git"]
        # 🚨 DESCOMENTAR CUANDO:
        #   • Hayas instalado gitleaks en tu sistema (brew install gitleaks)
        #   • Hayas limpiado todos los secretos del historial
        # 💡 ALTERNATIVA: Usar solo en CI/CD con GitHub Secret Scanning
        # enabled: false  # ← Descomentar para desactivar temporalmente

        # ──────────────────────────────────────────────────────────────────────────────
        # 🟠 FASE 3: TIPOS (mypy - Lento ~30-60 seg)
        # ──────────────────────────────────────────────────────────────────────────────
        # mypy verifica type hints. Es el más estricto y lento.
        # Recomendado: ACTIVAR en Semana 3-4 (cuando tu código tenga buenos type hints)
        # ⚠️  ADVERTENCIA: mypy puede ser frustrante al principio. Mejor en CI/CD.
  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.4.2
    hooks:
      - id: python-safety-dependencies-check
        stages: [manual] # 💾 RESTORE: [pre-commit]
         # 💾 RESTORE: [pre-commit]
        # 📝 Verifica vulnerabilidades en dependencias Python
        # 💡 Por qué: 🚨 SEGURIDAD - Evita usar paquetes con CVEs conocidos
        # 🚨 DESCOMENTAR CUANDO:
        #   • Lo uses en CI/CD (no pre-commit)
        #   • Lo ejecutes semanalmente, no en cada commit
        # 💡 RECOMENDACIÓN: Usar en GitHub Actions con schedule: weekly
        # enabled: false  # ← Mantener comentado (usar en CI/CD)

        # ──────────────────────────────────────────────────────────────────────────────
        # 🔵 FASE 4: MENSAJES DE COMMIT (commitizen - Rápido <1 seg)
        # ──────────────────────────────────────────────────────────────────────────────
        # Estandariza los mensajes de commit (Conventional Commits).
        # Recomendado: ACTIVAR si trabajás en equipo
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [manual] # 💾 RESTORE: [pre-commit]
         # 💾 RESTORE: [pre-commit]
        # 📝 Valida que los mensajes de commit sigan Convención
        # 💡 Por qué: Changelog automático, versionado semántico, claridad
        # 📋 Formato: type(scope): description
        #   • type: feat, fix, docs, style, refactor, test, chore
        #   • scope: módulo afectado (opcional)
        #   • description: qué cambió (imperativo, sin punto final)
        # 🚨 DESCOMENTAR CUANDO:
        #   • Trabajes en equipo
        #   • Quieras changelog automático
        # enabled: false  # ← Descomentar para activar

        # ──────────────────────────────────────────────────────────────────────────────
        # 🔵 FASE 4: NOMENCLATURA DE RAMAS (branch-name-lint - Rápido <1 seg)
        # ──────────────────────────────────────────────────────────────────────────────
        # Valida que los nombres de ramas sigan un patrón (ej: feat/login).
        # Recomendado: ACTIVAR si trabajás en equipo
