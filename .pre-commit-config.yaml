# ╔══════════════════════════════════════════════════════════════════════════════╗
# #  📚 RESUMEN DE FASES PARA APRENDER                                          #
# #                                                                               #
# #  FASE 1 (Semana 1): ✅ pre-commit-hooks + black + ruff                        #
# #  • Rápido (<30 seg total)                                                     #
# #  • Atrapa errores básicos de formato y estilo                                 #
# #  • Recomendado: ACTIVAR SIEMPRE                                               #
# #                                                                               #
# #  FASE 2 (Semana 2): 🟡 bandit + gitleaks                                      #
# #  • Medio (~30-60 seg total)                                                   #
# #  • Atrapa vulnerabilidades de seguridad                                       #
# #  • Recomendado: ACTIVAR cuando entiendas los warnings                         #
# #                                                                               #
# #  FASE 3 (Semana 3-4): 🟠 mypy + pytest + safety                               #
# #  • Lento (~1-5 min total)                                                     #
# #  • Verificación profunda de tipos y tests                                     #
# #  • Recomendado: MOVER A CI/CD (GitHub Actions)                                #
# #                                                                               #
# #  FASE 4 (Opcional): 🔵 commitizen + branch-lint                               #
# #  • Rápido (<1 seg)                                                            #
# #  • Estandarización de equipo                                                  #
# #  • Recomendado: ACTIVAR si trabajás en equipo                                 #
# # ╚══════════════════════════════════════════════════════════════════════════════╝

# ╔══════════════════════════════════════════════════════════════════════════════╗
# #  🚀 COMANDOS ÚTILES PARA GESTIONAR HOOKS                                    #
# #                                                                               #
# #  # Instalar pre-commit (primera vez)                                          #
# #  pip install pre-commit                                                       #
# #                                                                               #
# #  # Instalar hooks en este repositorio                                         #
# #  pre-commit install                                                           #
# #                                                                               #
# #  # Probar en TODOS los archivos (sin commitear)                               #
# #  pre-commit run --all-files                                                   #
# #                                                                               #
# #  # Probar solo en archivos modificados (lo que hace git commit)               #
# #  pre-commit run                                                               #
# #                                                                               #
# #  # Ver qué hooks están activos actualmente                                    #
# #  pre-commit sample-config                                                     #
# #                                                                               #
# #  # Desinstalar hooks (si necesitas remover temporalmente)                     #
# #  pre-commit uninstall                                                         #
# #                                                                               #
# #  # Actualizar hooks a última versión (mantenimiento periódico)                #
# #  pre-commit autoupdate                                                        #
# #                                                                               #
# #  # Ejecutar un hook específico manualmente (para debugging)                   #
# #  pre-commit run black --all-files                                             #
# #  pre-commit run ruff --all-files                                              #
# # ╚══════════════════════════════════════════════════════════════════════════════╝

# ╔══════════════════════════════════════════════════════════════════════════════╗
# #  ⚠️  NOTAS IMPORTANTES PARA ENTORNOS COMO GOOGLE COLAB                      #
# #                                                                               #
# #  • Los pre-commit hooks se instalan en el entorno LOCAL, no en Colab          #
# #  • En Colab, usa tu GitHub Actions CI/CD como gatekeeper principal            #
# #  • Esta configuración es para cuando trabajes en tu máquina local (VS Code)   #
# #  • Los hooks comentados (Fase 2-4) están listos para activar cuando quieras   #
# #  • Para activar un hook: quitar el # inicial de cada línea del bloque         #
# # ╚══════════════════════════════════════════════════════════════════════════════╝
