# Ruff Configuration - Contrato de Calidad PRO (SRE Standard)
# ═══════════════════════════════════════════════════════════════════════════════

[lint]
select = [
    "E",   # Errores de estilo (PEP8)
    "W",   # Advertencias de estilo
    "F",   # Errores lógicos (vital para estabilidad)
    #"I",   # Orden de imports (isort)
    "B",   # Previene bugs comunes (bugbear)
    "C4",  # Optimiza comprensiones de listas/dicts
    "UP",  # Sintaxis de Python moderno
    #"SIM", # Simplificación de código (legibilidad)
    #"T20", # Prohíbe prints (obliga a usar logging)
]

ignore = [
    "E501",   # Líneas largas (lo maneja el formateador)
    "UP017",  # Compatibilidad timezone.utc vs datetime.UTC
]

[lint.per-file-ignores]
"tests/**/*.py" = ["F401", "F841", "T201"] # Permitimos prints en tests para debugging rápido
"**/test_*.py" = ["F401", "F841", "T201"]
"__init__.py" = ["F401"]

[lint.isort]
known-first-party = ["english_editor"]
combine-as-imports = true
lines-after-imports = 2

[format]
quote-style = "double"
indent-style = "space"